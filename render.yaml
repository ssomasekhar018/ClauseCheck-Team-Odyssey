services:
  - type: web
    name: law-simulation-backend
    env: python
    rootDir: law-de/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: static_site
    name: law-simulation-frontend
    rootDir: law-de/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_HOST
        fromService:
          type: web
          name: law-simulation-backend
          property: host
      - key: VITE_API_PORT   # optional – most Render sites expose HTTPS on 443
        fromService:
          type: web
          name: law-simulation-backend
          property: port
