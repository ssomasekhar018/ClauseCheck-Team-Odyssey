services:
  # --------------------------------------------------------------------------------
  # COURTROOM SIMULATION (Law De)
  # --------------------------------------------------------------------------------
  # Backend Service (FastAPI)
  - type: web
    name: law-simulation-backend
    env: python
    rootDir: "law de/backend"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    plan: free

  # Frontend Service (React/Vite)
  - type: static_site
    name: law-simulation-frontend
    rootDir: "law de/frontend"
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: law-simulation-backend
          property: url
