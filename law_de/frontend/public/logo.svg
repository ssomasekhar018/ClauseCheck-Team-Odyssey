<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Filled circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient)" stroke="rgba(255, 255, 255, 0.3)" stroke-width="3"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(139, 92, 246, 0.9);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(59, 130, 246, 0.9);stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Scales of justice icon -->
  <g transform="translate(100, 100)">
    <!-- Center pole -->
    <rect x="-3" y="-40" width="6" height="80" fill="white" rx="2"/>
    
    <!-- Balance beam -->
    <rect x="-45" y="-40" width="90" height="4" fill="white" rx="2"/>
    
    <!-- Left scale -->
    <line x1="-35" y1="-36" x2="-35" y2="-20" stroke="white" stroke-width="2"/>
    <ellipse cx="-35" cy="-15" rx="15" ry="8" fill="white" opacity="0.9"/>
    
    <!-- Right scale -->
    <line x1="35" y1="-36" x2="35" y2="-20" stroke="white" stroke-width="2"/>
    <ellipse cx="35" cy="-15" rx="15" ry="8" fill="white" opacity="0.9"/>
    
    <!-- Base -->
    <rect x="-20" y="40" width="40" height="6" fill="white" rx="2"/>
  </g>
</svg>