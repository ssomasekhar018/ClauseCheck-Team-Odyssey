<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Law CSE Files Library</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #020617;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .global-navbar {
      width: 100%;
      background: #0f172a;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .navbar-brand {
      font-weight: 700;
      font-size: 1rem;
      color: #e5e7eb;
    }

    .navbar-links {
      display: flex;
      gap: 1rem;
      font-size: 0.9rem;
    }

    .navbar-links a {
      color: #e5e7eb;
      text-decoration: none;
      padding: 0.4rem 0.8rem;
      border-radius: 0.5rem;
      transition: background 0.2s ease;
    }

    .navbar-links a:hover {
      background: rgba(168, 85, 247, 0.2);
    }

    .navbar-links a.active {
      background: rgba(168, 85, 247, 0.3);
      font-weight: 600;
    }

    .wrapper {
      text-align: center;
    }

    h1 {
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.9rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <!-- Global Navbar -->
  <nav class="global-navbar">
    <span class="navbar-brand">Legal Tech Suite</span>
    <div class="navbar-links">
      <a href="http://localhost:8080">Home</a>
      <a href="http://localhost:5175">AI Contract Analysis</a>

    </div>
  </nav>

  <div class="wrapper">
    <h1>Law CSE Files Library</h1>

  </div>
